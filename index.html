    <script>
      window.LAUNCH_CONFIG = Object.assign({
        canonicalUrl: '',
        ogImageUrl: '',
        enableAds: false,
        adsenseClient: '',
        enableAnalytics: false,
        gaMeasurementId: '',
        enableCrossPromo: false,
        crossPromoScriptUrl: ''
      }, window.LAUNCH_CONFIG || {});
    </script>

    <script id="schema-game" type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Road Shooter",
        "description": "Squad runner shooter game. Start with 1 soldier, collect items, choose gates, build an army of 200, and defeat epic bosses!",
        "url": "./",
        "genre": ["Action", "Runner", "Shooter"],
        "gamePlatform": "Web Browser",
        "operatingSystem": "Any",
        "applicationCategory": "Game",
        "author": { "@type": "Organization", "name": "Road Shooter Team" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "inLanguage": ["ko","en","zh","hi","ru","ja","es","pt","id","tr","de","fr"]
    }
    </script>

    <script>
      (function applyLaunchConfig() {
        const cfg = window.LAUNCH_CONFIG || {};
        const pageUrl = (cfg.canonicalUrl && cfg.canonicalUrl.trim())
          ? cfg.canonicalUrl.trim()
          : window.location.href.split('#')[0];
        const imageUrl = (cfg.ogImageUrl && cfg.ogImageUrl.trim())
          ? cfg.ogImageUrl.trim()
          : new URL('icon-512.svg', pageUrl).href;

        const canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) canonical.href = pageUrl;

        const ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) ogUrl.content = pageUrl;

        const ogImage = document.querySelector('meta[property="og:image"]');
        if (ogImage) ogImage.content = imageUrl;

        document.querySelectorAll('link[rel="alternate"][hreflang]').forEach((el) => {
          el.href = pageUrl;
        });

        const schemaNode = document.getElementById('schema-game');
        if (schemaNode) {
          try {
            const schema = JSON.parse(schemaNode.textContent);
            schema.url = pageUrl;
            schemaNode.textContent = JSON.stringify(schema);
          } catch (_) {}
        }

        const appendScript = (src, attrs) => {
          const script = document.createElement('script');
          script.src = src;
          Object.entries(attrs || {}).forEach(([key, value]) => {
            if (value === true) {
              script.setAttribute(key, '');
            } else if (value !== false && value != null) {
              script.setAttribute(key, String(value));
            }
          });
          document.head.appendChild(script);
        };

        if (cfg.enableAds && cfg.adsenseClient) {
          const adSrc = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + encodeURIComponent(cfg.adsenseClient);
          appendScript(adSrc, { async: true, crossorigin: 'anonymous' });
        }

        if (cfg.enableAnalytics && cfg.gaMeasurementId) {
          const gaSrc = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(cfg.gaMeasurementId);
          appendScript(gaSrc, { async: true });
          window.dataLayer = window.dataLayer || [];
          window.gtag = function gtag() { window.dataLayer.push(arguments); };
          window.gtag('js', new Date());
          window.gtag('config', cfg.gaMeasurementId);
        }
      })();
    </script>

    <script>
      (function loadCrossPromoIfEnabled() {
        const cfg = window.LAUNCH_CONFIG || {};
        if (!cfg.enableCrossPromo || !cfg.crossPromoScriptUrl) return;
        const script = document.createElement('script');
        script.src = cfg.crossPromoScriptUrl;
        script.defer = true;
        document.body.appendChild(script);
      })();
    </script>
